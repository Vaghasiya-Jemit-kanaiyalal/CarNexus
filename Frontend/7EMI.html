<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Page</title>
    <link rel="stylesheet" href="style.css" class="css">
</head>

<body>

    <!-- Navigation -->
    <header>
        <div class="nav-bar">
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav id="nav-menu">
                <h3>
                    <a href="../index.html" target="_blank">Home</a>
                    <a href="2CARS.html">Cars</a>
                    <a href="3Service.html">Service</a>
                    <a href="4Testdrive.html">Test-Drive</a>
                    <a href="5Compare.html">Compare</a>
                    <a href="6Offers.html">Offers</a>
                    <a href="7EMI.html">EMI-calculate</a>
                    <a href="8Review.html">Reviews</a>
                    <a href="9Location.html">Locations</a>
                </h3>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="emi-banner">
            <img src="https://www.indusind.com/iblogs/wp-content/uploads/smart-car-loan.jpg" width="100%" alt="EMI">
        </div>

        <div class="emi-message" style="text-align: center; padding: 20px;">
            <h1>Low Budget? Do not Worry.. <br>Make your Dream Car Your Own Right Now with EMI*</h1>
            <h4><a href="TermsAndCondition.html">Terms & Conditions*</a></h4>
        </div>


        <div class="emi-calculator">
            <h2>EMI Calculator</h2>

            <label for="loan">Loan Amount (₹):</label>
            <input type="number" id="loan" placeholder="e.g., 500000">

            <label for="rate">Annual Interest Rate (%):</label>
            <input type="number" id="rate" step="0.01" placeholder="e.g., 7.5">

            <label for="tenure">Tenure (Years):</label>
            <input type="number" id="tenure" placeholder="e.g., 5">

            <button onclick="calculateEMI()">Calculate EMI</button>

            <div class="result" id="result"></div>
        </div>




    </main>



    <!-- Footer -->
    
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=dealerindia280@gmail.com" target="_blank">
                    dealerindia280@gmail.com
                </a>
                <a href="Aboutus.html">About us /Contact us</a>
                <a href="Help.html">Help</a>
            </div>
        </div>
    </footer>
    <script>
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('nav-menu');

        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        });

        // Close menu when a link is clicked
        const navLinks = navMenu.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                hamburger.classList.remove('active');
            });
        });
    </script>

</body>

</html>
