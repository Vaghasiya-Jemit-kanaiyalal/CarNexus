        <div class="form" style="max-width: 500px; margin: auto; padding: 20px; text-align: center;">
            <h2>Service Appointment Form</h2>

            <form action="https://carnexus-7shf.onrender.com/Backend/addService.php" method="post">
                <div class="form-group" >
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Full Name" required />
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Email Address" required />
                </div>
                <div class="form-group">
                    <label for="mobile">Mobile No</label>
                    <input type="tel" id="mobile" name="mobile" placeholder="Mobile Number" required />
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="Your Address" required />
                </div>



                <div class="form-group">
                    <label for="issue">Issue</label>
                    <textarea  id="issue" name="issue" placeholder="  Describe the issue..." rows="4" style="width: 100%; border-radius:15px ;" required></textarea>
                </div>

                <button type="submit" class="btn-login">Submit</button>
            </form>
