        <div class="signup-container" style="max-width: 400px; margin: auto; padding: 20px; text-align: center;">
            <h2>Hello User..! Fill the given info to make your New Account</h2>

            <h3>Signup</h3>

            <form action="https://carnexus-7shf.onrender.com/Backend/Signup.php" method="post"> <!-- POST method -->

                <div class="form-group" style="margin-bottom: 15px; text-align: left;">
                    <label for="username">Name</label>
                    <input type="text" id="username" name="username" placeholder="Username" required
                        style="width: 100%; padding: 8px;" />
                </div>

                <div class="form-group" style="margin-bottom: 15px; text-align: left;">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Email" required
                        style="width: 100%; padding: 8px;" />
                </div>

                <div class="form-group" style="margin-bottom: 15px; text-align: left;">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password" minlength="8" required
                        style="width: 100%; padding: 8px;" />
                </div>

                <div class="form-group" style="margin-bottom: 15px; text-align: left;">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" name="confirm" placeholder="Confirm Password" minlength="8"
                        required style="width: 100%; padding: 8px;" />
                </div>

                <button type="submit" class="btn-login"
                    style="width: 100%; padding: 10px; font-size: 16px;">Signup</button>
            </form>
        </div>
